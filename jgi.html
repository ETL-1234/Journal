<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Choose Background</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
<style>

body{
font-family:Inter,sans-serif;
margin:0;
padding:20px;
overflow-y:auto;
scrollbar-width:none;      /* Firefox */
}

body::-webkit-scrollbar{
display:none;              /* Chrome / Safari */
}

   html, body {
  margin: 0;
  padding: 20px;

  overflow-x: hidden;
  overflow-y: auto;

  scrollbar-width: none;   /* Firefox */
  -ms-overflow-style: none; /* IE/Edge */
}

html::-webkit-scrollbar,
body::-webkit-scrollbar {
  display: none; /* Chrome/Safari */
}

  
h2{
text-align:center;
margin-bottom:20px;
font-family:'Inter', sans-serif;
font-size:18px;
font-weight:500;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
gap:10px;
}

.grid img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
cursor:pointer;
border-radius:10px;
}
  
 
</style>
</head>

<body>

<h2>Choose your background image</h2>

<div id="grid" class="grid"></div>

<script>

const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

async function loadImages(){
  const grid = document.getElementById("grid");

  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/gratitudeimage?select=imageurl`,
      {
        headers:{
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`
        }
      }
    );

    console.log("Response status:", res.status);

    const data = await res.json();
    console.log("Data:", data);

    if(!Array.isArray(data)){
      throw new Error("Invalid response format");
    }

    if(data.length === 0){
      grid.innerHTML = "<p>No images found</p>";
      return;
    }

    data.forEach(img=>{
      if(!img.imageurl) return;

      const el = document.createElement("img");
      el.src = img.imageurl;

      el.onerror = () => {
        console.warn("Broken image:", img.imageurl);
        el.style.display = "none";
      };

      el.onclick = ()=>{
        localStorage.setItem("gratitude_bg", img.imageurl);
        window.location.href="https://etl-1234.github.io/Journal/jg.html";
      };

      grid.appendChild(el);
    });

  }catch(err){
    console.error("FULL ERROR:", err);

    grid.innerHTML = `
      <div style="text-align:center">
        <p>Something went wrong loading images</p>
        <p style="font-size:12px;color:gray;">Check console</p>
      </div>
    `;
  }
}
  
  loadImages();

</script>

</body>
</html>
