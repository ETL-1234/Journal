<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Period Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
    font-family:'Inter',sans-serif;
    color:#000;
}
  
.wrap{

    display:flex;
    flex-direction:column;
    align-items:center;

    width:100%;
    box-sizing:border-box;

    padding:20px 24px 28px 24px;
}

  
#phase{
  font-size:18px;
  font-weight:600;
  margin-bottom:18px;
  text-align:center;

}
  
img{
    display:block;
    width:90%;
    max-width:90%;
    height:auto;
    object-fit:contain;
    margin:0 auto;
    border-radius:18px;
    box-shadow:
    0 6px 14px rgba(0,0,0,.12),
    0 18px 40px rgba(0,0,0,.20);
}
  
#days{
  font-size:16px;
  margin-top:32px;
  font-style:italic;
  text-align:center;
}
  
</style>
</head>
<body>
  
<div class="wrap">
<div id="phase"></div>
<img id="card" style="display:none">
<div id="days"></div>
  
</div>
  
<script>
  
const CACHE_KEY="guidance_cache";
  
function cycleDay(){
 const lp=localStorage.getItem("last_period_start");
  
 if(!lp) return null;
  
 const cl=Number(localStorage.getItem("cycle_length")||28);
 const d=Math.floor((new Date()-new Date(lp))/86400000);
  
 return d<0?null:(d%cl)+1;
}
  
function phase(day){
  
 if(day==null)return "";
 const cl=Number(localStorage.getItem("cycle_length")||28);
 const pl=Number(localStorage.getItem("period_length")||5);
 const ov=cl-14;
 const mid=ov+1+Math.floor((cl-(ov+1)+1)/2);
  
 if(day<=pl)return "Menstrual phase";
 if(day===ov)return "Ovulation";
 if(day<ov)return "Follicular phase";
 if(day<mid)return "Early luteal phase";
  
 return "Late luteal phase";
}
  
function daysLeft(day){
  
 const cl=Number(localStorage.getItem("cycle_length")||28);
 const left=cl-day;
  
 return left===1?"1 day to your next period":left+" days to your next period";
}
  
function render(){

    const id =
        localStorage.getItem("current_guidance_id");

    const lastPeriod =
    localStorage.getItem("last_period_start");

    if(!lastPeriod){

        document.getElementById("phase").textContent =
            "Click to set up the period tracker";

        document.getElementById("days").textContent =
            "See daily guidance cards";

        const img =
            document.getElementById("card");

        img.src =
        "https://tppyzexttkuvcobbbmaz.supabase.co/storage/v1/object/public/phasecard/PH.png";

        img.style.display = "block";

        return;

    }

    const v =
        Number(localStorage.getItem(
            "guidance_version_"+id
        )||1);
  
 const cache=JSON.parse(localStorage.getItem(CACHE_KEY)||"[]");
 const row=cache.find(r=>String(r.statement_id).trim()===id && Number(r.version)===v);
  
 if(row){const img=document.getElementById("card");img.src=row.image_file;img.style.display="block";}
 const cd=cycleDay();
  
 document.getElementById("phase").textContent=phase(cd);
  
 if(cd!=null)document.getElementById("days").textContent=daysLeft(cd);
}
  
render();
window.addEventListener("resize", render);
window.addEventListener("storage",render);
    let lastState = "";

function checkForUpdates(){

    const state = JSON.stringify({

        guidance:
            localStorage.getItem("current_guidance_id"),

        version:
            localStorage.getItem(
                "guidance_version_" +
                localStorage.getItem("current_guidance_id")
            ),

        period:
            localStorage.getItem("last_period_start"),

        cycle:
            localStorage.getItem("cycle_length"),

        periodLength:
            localStorage.getItem("period_length")

    });

    if(state !== lastState){

        lastState = state;

        render();

    }

}

setInterval(checkForUpdates,750);
  
</script>
</body>
</html>
