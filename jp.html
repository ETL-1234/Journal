<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Period Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#FFFFFF;
  display:flex;
  justify-content:center;
}

.app{
  max-width:430px;
  width:100%;
  padding:16px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 0px 0px rgba(0,0,0,0.12);
  display:flex;
  flex-direction:column;
}

#comment{
  color: #000;
  font-style: italic;
  margin-bottom:12px;
}

textarea{
  font-family:'Inter',sans-serif;
  width:100%;
  resize:none;
  border:none;
  outline:none;
  padding:12px;
  font-size:14px;
  line-height:1.6;
  min-height:18vh;
  margin-top:8px;
}

.selectors{
  display:flex;
  gap:12px;
  margin-bottom:16px;
}

#calendarGrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  text-align:center;
  margin-bottom:16px;
}

.dayBtn{
  position:relative;
  border:1px solid #eee;
  padding:8px;
  border-radius:8px;
  background:#fff;
  cursor:pointer;
  font-size:12px;
}

.today{
  position:relative;
}

.today::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.12);
  border-radius:8px;
  pointer-events:none;
}

.entryDot{
  position:absolute;
  bottom:4px;
  right:4px;
  width:5px;
  height:5px;
  background:#000;
  border-radius:50%;
}

#prevMonth,
#nextMonth{
  font-size:24px;
  background:none;
  border:none;
  cursor:pointer;
  padding:4px 8px;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.buttons{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-bottom:16px;
  position:relative;
}

/* PHASE COLORS */
.menstrual{background:#f7d6d6;}
.follicular{background:#e3f4e3;}
.ovulation{background:#95bb97;}
.luteal{background:#e3edf8;}
.fertile{background:#e3f4e3;border:2px solid #95bb97;}

select{
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
}

</style>
  
</head>

<body>

<div class="app">
  <div class="card">

    <h1 style="font-size:22px;margin-bottom:6px;">Period Tracker</h1>

    <!-- Cycle & Period Length Selectors -->
    <div class="selectors">
      <div>
        <label style="font-size:14px;">Cycle length</label><br>
        <select id="cycleLength"></select>
      </div>
      <div>
        <label style="font-size:14px;">Period length</label><br>
        <select id="periodLength"></select>
      </div>
    </div>

    <!-- Guidance & Confirmation Messages -->
    <p id="comment" style="font-size:16px;color:#555;margin-bottom:12px;"></p>
    <p id="confirmationMsg" style="font-size:14px;color:#2e7d32;margin-bottom:10px;height:18px;"></p>

    <!-- Month Navigation -->
    <div class="calendar-header">
      <button id="prevMonth">‹</button>
      <h3 id="calendarTitle"></h3>
      <button id="nextMonth">›</button>
    </div>

    <!-- Calendar Grid -->
    <div id="calendarGrid"></div>

    <!-- Buttons for Download & Today -->
    <div class="buttons">
      <button id="downloadEntries" style="font-size:14px;background:none;border:none;cursor:pointer;color:black;font-style:italic;">Download</button>
      <button id="returnToday" style="font-size:14px;background:none;border:none;cursor:pointer;color:black;font-style:italic;">Today</button>
    </div>

    <hr style="margin:20px 0;">

    <!-- Current Date & Journal -->
    <p id="currentDate" style="font-size:12px;color:#888;"></p>
    <textarea id="journalTextarea" placeholder="Daily reflection…"></textarea>

  </div>
</div>

<script>

 
/* STORAGE */

const STORAGE_KEY='cycle_journal_entries';
let entries=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');

let cycleLength=Number(localStorage.getItem('cycle_length')||28);
let periodLength=Number(localStorage.getItem('period_length')||5);
let lastPeriod=localStorage.getItem('last_period_start');

/* GUIDANCE 28 */

const guidance28=[
"Energy low. Focus on rest, comfort, and gentle awareness.",
"Continue resting and listening to your body’s needs.",
"Energy may slowly begin returning. Move gently.",
"Light clarity may appear. Keep the pace soft.",
"Transition day. Notice energy beginning to rise again.",
"Energy building. Good day for light planning.",
"Curiosity and motivation may increase today.",
"Mental clarity improving. Explore new ideas.",
"Creative thinking and openness may feel natural.",
"Steady energy. A supportive day for starting tasks.",
"Confidence building. Take small forward steps.",
"Energy continues rising. Communication may feel easier.",
"Social and expressive energy may increase today.",
"Peak energy window. Good day for connection and visibility.",
"Energy still strong. Channel it into meaningful action.",
"Focused productivity may feel natural today.",
"Steady, grounded energy supports completion.",
"Good day for organization and follow-through.",
"Focus remains steady. Work through practical tasks.",
"Gradually slow the pace if needed. Notice energy shifts.",
"Emotional awareness may increase. Listen inward.",
"Energy may begin to dip. Prioritize supportive routines.",
"Sensitivity may rise. Protect your energy.",
"A good day to simplify tasks and reduce pressure.",
"Restorative activities may feel especially helpful.",
"Reflect on the past weeks and what you need now.",
"Slow down and prepare for a new cycle.",
"Gentle reflection. A new cycle may begin soon."
];

/* DROPDOWNS */

const cycleSelect=document.getElementById('cycleLength');
for(let i=21;i<=38;i++){
let opt=document.createElement('option');
opt.value=i;
opt.textContent=i;
if(i===cycleLength)opt.selected=true;
cycleSelect.appendChild(opt);
}

const periodSelect=document.getElementById('periodLength');
for(let i=2;i<=8;i++){
let opt=document.createElement('option');
opt.value=i;
opt.textContent=i;
if(i===periodLength)opt.selected=true;
periodSelect.appendChild(opt);
}

cycleSelect.onchange=()=>{
cycleLength=Number(cycleSelect.value);
localStorage.setItem('cycle_length',cycleLength);
generateCalendar();
};

periodSelect.onchange=()=>{
periodLength=Number(periodSelect.value);
localStorage.setItem('period_length',periodLength);
generateCalendar();
};

/* DATE STATE */

let today=new Date();
let currentDate=today.toISOString().split('T')[0];

const textarea=document.getElementById('journalTextarea');
const currentDateEl=document.getElementById('currentDate');

/* CYCLE DAY */

function getCycleDay(date){

if(!lastPeriod)return null;

let d=new Date(date);
let start=new Date(lastPeriod);

let diff=Math.floor((d-start)/86400000);

if(diff<0)return null;

return (diff % cycleLength)+1;

}

/* PHASE */

function getPhase(day){

if(day === null) return '';

const ovulationDay = cycleLength - 14;
const fertileStart = Math.max(1, ovulationDay - 5);
const fertileEnd = Math.min(cycleLength, ovulationDay - 1);

if(day <= periodLength) return 'menstrual';

/* fertile window BEFORE ovulation */

if(day >= fertileStart && day <= fertileEnd) return 'fertile';

/* ovulation */

if(day === ovulationDay) return 'ovulation';

/* follicular */

if(day > periodLength && day < ovulationDay) return 'follicular';

/* luteal */

return 'luteal';

}
/* GUIDANCE */

function updateComment(){

let todayKey = today.toISOString().split('T')[0];
let day = getCycleDay(todayKey);

if(day && guidance28[day-1]){

document.getElementById('comment').textContent =
guidance28[day-1];

}else{

document.getElementById('comment').textContent =
"Long-press a day to mark the start of your last period.";

}

}

/* JOURNAL */

function updateDisplay(){

const dayEntry = entries[currentDate] || "";

const todayKey = today.toISOString().split('T')[0];

textarea.value = dayEntry;

// Only allow editing for today
if(currentDate === todayKey){
    textarea.removeAttribute('readonly');
} else {
    textarea.setAttribute('readonly', true);
}
currentDateEl.textContent=currentDate;

updateComment();

textarea.addEventListener('input',()=>{

entries[currentDate] = textarea.value;

localStorage.setItem(STORAGE_KEY,JSON.stringify(entries));

});
}
  
/* CALENDAR */

const calendarGrid=document.getElementById('calendarGrid');
const calendarTitle=document.getElementById('calendarTitle');

let calendarMonth=new Date(today.getFullYear(),today.getMonth(),1);

function generateCalendar(){

calendarGrid.innerHTML='';

const year=calendarMonth.getFullYear();
const month=calendarMonth.getMonth();

calendarTitle.textContent=
calendarMonth.toLocaleString('default',{month:'long',year:'numeric'});

const startDay=new Date(year,month,1).getDay();
const daysInMonth=new Date(year,month+1,0).getDate();

['S','M','T','W','T','F','S'].forEach(d=>{
let div=document.createElement('div');
div.textContent=d;
calendarGrid.appendChild(div);
});

for(let i=0;i<startDay;i++){
calendarGrid.appendChild(document.createElement('div'));
}

for(let d=1;d<=daysInMonth;d++){

const btn=document.createElement('button');
btn.className='dayBtn';
btn.textContent=d;

const dateKey=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

let cycleDay=getCycleDay(dateKey);
let phase=getPhase(cycleDay);

if(phase)btn.classList.add(phase);

if(dateKey===today.toISOString().split('T')[0])
btn.classList.add('today');

if(entries[dateKey] && entries[dateKey].length > 0){
let dot=document.createElement('div');
dot.className='entryDot';
btn.appendChild(dot);
}

 
  /* TAP */
  
let pressTimer;
let longPress=false;

/* START PRESS */

btn.addEventListener("pointerdown", () => {

longPress=false;

pressTimer=setTimeout(()=>{

longPress=true;

lastPeriod=dateKey;
localStorage.setItem('last_period_start',dateKey);

document.getElementById("confirmationMsg").textContent =
"You've set " + dateKey + " as the first day of your last period.";

setTimeout(()=>{
document.getElementById("confirmationMsg").textContent="";
},3000);

generateCalendar();
updateComment();


},700);

});

/* RELEASE PRESS */

btn.addEventListener("pointerup", () => {

clearTimeout(pressTimer);

if(!longPress){
currentDate=dateKey;
updateDisplay();
generateCalendar();
}

});

/* CANCEL PRESS */

btn.addEventListener("pointerleave", ()=>{
clearTimeout(pressTimer);
});
calendarGrid.appendChild(btn);
 }
}

    document.getElementById('downloadEntries').onclick = () => {
    const lines = [];
    const keys = Object.keys(entries).sort();

    keys.forEach(dateKey => {
        // Skip entries older than 365 days
        const entryDate = new Date(dateKey);
        const diffDays = Math.floor((today - entryDate)/86400000);
        if(diffDays > 365) {
            delete entries[dateKey];
            return;
        }

        
        const dayNum = getCycleDay(dateKey) || '-';
        const phaseName = getPhase(dayNum) || '-';
        const text = entries[dateKey];

       lines.push(${dateKey} | Phase: ${phaseName} | Cycle Day: ${dayNum}\n${text}\n); }); 

    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));

    const blob = new Blob([lines.join('\n')], {type: "text/plain"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'cycle_journal.txt';
    a.click();
    URL.revokeObjectURL(url);
};

  
/* MONTH NAV */

document.getElementById('prevMonth').onclick=()=>{
calendarMonth.setMonth(calendarMonth.getMonth()-1);
generateCalendar();
};

document.getElementById('nextMonth').onclick=()=>{
calendarMonth.setMonth(calendarMonth.getMonth()+1);
generateCalendar();
};

  document.getElementById('returnToday').onclick = () => {
    calendarMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    currentDate = today.toISOString().split('T')[0];
    generateCalendar();
    updateDisplay();
    updateComment();
};

  /* SWIPE */
  let startX = 0;

calendarGrid.addEventListener('touchstart', e=>{
startX = e.touches[0].clientX;
});

calendarGrid.addEventListener('touchend', e=>{

let endX = e.changedTouches[0].clientX;
let diff = endX - startX;

if(diff > 70){
calendarMonth.setMonth(calendarMonth.getMonth()-1);
generateCalendar();
}

if(diff < -70){
calendarMonth.setMonth(calendarMonth.getMonth()+1);
generateCalendar();
}

});

  
/* INIT */
  
generateCalendar();
updateDisplay();
updateComment();

</script>

</body>
</html>
