<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Gratitude Reflection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>

  body{
margin:0;
font-family:'Inter',sans-serif;
height:100dvh;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
justify-content:center;
}

.app{
max-width:430px;
width:100%;
height:100dvh;
position:relative;
display:flex;
flex-direction:column;
}

/* DARK OVERLAY */

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
pointer-events:none;
z-index:1;
}

/* PROMPT AREA */

.promptArea{
height:66%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
color:white;
z-index:2;
}

#prompt{
font-size:22px;
line-height:1.5;
margin-bottom:28px;
max-width:320px;
}

/* REFRESH BUTTON */

.refreshBtn{
display:flex;
align-items:center;
gap:8px;
background:transparent;
border:1.5px solid white;
color:white;
padding:10px 18px;
border-radius:24px;
font-size:14px;
cursor:pointer;
}

/* IMAGE BUTTON */

.imageBtn{
position:absolute;
top:18px;
right:18px;
width:28px;
height:28px;
width:28px;
height:28px;
cursor:pointer;
z-index:3;
}

/* JOURNAL PANEL */

.journalPanel{
height:48%;
margin-top:-120px;
background:rgba(255,255,255,0.92);
backdrop-filter: blur(12px);
padding:24px;
border-top-left-radius:36px;
border-top-right-radius:36px;
box-shadow:0 -12px 30px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
z-index:3;
}

/* DATE */

.journalDate{
font-size:13px;
color:#333;
margin-bottom:10px;
}

/* TEXT AREA */

textarea{
flex:1;
width:100%;
border:none;
resize:none;
outline:none;
font-family:'Inter', sans-serif;
font-size:16px;
font-weight:400;
color:#000;
line-height:1.6;
background:transparent;
}

/* DOWNLOAD */

.download{
text-align:right;
font-style:italic;
cursor:pointer;
font-size:14px;
margin-top:6px;
}
</style>
</head>

<body>

<div class="app">

<div class="overlay"></div>

<div class="imageBtn">
<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
<rect x="3" y="3" width="18" height="18" rx="2"/>
<circle cx="8.5" cy="8.5" r="1.5"/>
<path d="M21 15l-5-5L5 21"/>
</svg>
</div>

<div class="promptArea">

<div id="prompt">Loading reflection...</div>

<button class="refreshBtn" onclick="loadPrompt()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="white">
<path d="M17.65 6.35A7.95 7.95 0 0012 4V1L7 6l5 5V7a5 5 0 11-5 5H5a7 7 0 107.75-6.93z"/>
</svg>
Refresh Prompt
</button>

</div>

<div class="journalPanel">

<div id="currentDate" class="journalDate"></div>

<textarea id="journal" placeholder="Daily gratitude reflection..."></textarea>

<div class="download" onclick="downloadJournal()">Download</div>

</div>

</div>


<script>

/* SUPABASE */

const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";


/* BACKGROUND IMAGE */

const savedImage = localStorage.getItem("gratitude_bg");

if(savedImage){
document.body.style.backgroundImage = `url(${savedImage})`;
}

/* DATE */

const today = new Date().toISOString().split('T')[0];
document.getElementById("currentDate").textContent = today;

/* PROMPT FETCH */

async function loadPrompt(){

const res = await fetch(
`${SUPABASE_URL}/rest/v1/gratitudeprompts?select=gratitude&active=eq.true`,
{
headers:{
apikey:SUPABASE_ANON_KEY,
Authorization:`Bearer ${SUPABASE_ANON_KEY}`
}
});

const data = await res.json();

const random = data[Math.floor(Math.random()*data.length)];

document.getElementById("prompt").textContent = random.gratitude;

}

loadPrompt();

/* IMAGE PAGE */

function openImages(){
window.location.href="gratitude-images.html";
}

  document.querySelector(".imageBtn").onclick = openImages;

/* JOURNAL STORAGE */

const STORAGE="gratitude_journal";

let entries=JSON.parse(localStorage.getItem(STORAGE)||"{}");

const textarea=document.getElementById("journal");

textarea.value = entries[today] || "";

textarea.addEventListener("input",()=>{

entries[today]=textarea.value;

localStorage.setItem(STORAGE,JSON.stringify(entries));

});

/* DOWNLOAD */

function downloadJournal(){

let text="";

Object.keys(entries).sort().forEach(date=>{
text += date + "\n" + entries[date] + "\n\n";
});

const blob = new Blob([text],{type:"text/plain"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href=url;
a.download="gratitude_journal.txt";
a.click();

URL.revokeObjectURL(url);

}

</script>

</body>
</html>
