<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Gratitude Reflection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#ffffff;
display:flex;
justify-content:center;
}

.app{
max-width:430px;
width:100%;
}

.card{
border-radius:16px;
overflow:hidden;
}

/* TOP IMAGE AREA */

.promptArea{
height:320px;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:30px;
background-size:cover;
background-position:center;
}

.promptOverlay{
background:rgba(0,0,0,0.35);
position:absolute;
inset:0;
}

.promptContent{
position:relative;
z-index:2;
}

#prompt{
font-size:20px;
line-height:1.4;
margin-bottom:20px;
}

.refreshBtn{
border:none;
background:white;
padding:10px 16px;
border-radius:20px;
font-size:14px;
cursor:pointer;
}

/* IMAGE SELECTOR */

.imageBtn{
position:absolute;
top:16px;
right:16px;
z-index:3;
font-size:20px;
cursor:pointer;
}

/* JOURNAL */

.journalPanel{
background:rgba(255,255,255,0.9);
margin-top:-40px;
padding:24px;
border-top-left-radius:36px;
border-top-right-radius:36px;
}

.journalDate{
font-size:12px;
margin-bottom:8px;
color:#555;
}

textarea{
width:100%;
border:none;
resize:none;
font-size:16px;
line-height:1.6;
min-height:160px;
outline:none;
background:transparent;
}

/* DOWNLOAD */

.download{
text-align:right;
font-style:italic;
cursor:pointer;
font-size:14px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="card">

<div id="promptArea" class="promptArea">

<div class="promptOverlay"></div>

<div class="imageBtn" onclick="openImages()">🖼</div>

<div class="promptContent">

<div id="prompt">Loading reflection...</div>

<button class="refreshBtn" onclick="loadPrompt()">🔄 Refresh Prompt</button>

</div>
</div>


<div class="journalPanel">

<div id="currentDate" class="journalDate"></div>

<textarea id="journal" placeholder="Write your gratitude reflection..."></textarea>

<div class="download" onclick="downloadJournal()">Download</div>

</div>

</div>
</div>


<script>

/* SUPABASE */

const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

/* BACKGROUND IMAGE */

const promptArea = document.getElementById("promptArea");

const savedImage = localStorage.getItem("gratitude_bg");

if(savedImage){
promptArea.style.backgroundImage = `url(${savedImage})`;
}

/* DATE */

const today = new Date().toISOString().split('T')[0];
document.getElementById("currentDate").textContent = today;

/* PROMPT FETCH */

async function loadPrompt(){

const res = await fetch(
`${SUPABASE_URL}/rest/v1/gratitudeprompts?select=gratitude&active=eq.true&order=random()&limit=1`,
{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data = await res.json();

document.getElementById("prompt").textContent = data[0].gratitude;

}

loadPrompt();

/* IMAGE PAGE */

function openImages(){
window.location.href="gratitude-images.html";
}

/* JOURNAL STORAGE */

const STORAGE="gratitude_journal";

let entries=JSON.parse(localStorage.getItem(STORAGE)||"{}");

const textarea=document.getElementById("journal");

textarea.value = entries[today] || "";

textarea.addEventListener("input",()=>{

entries[today]=textarea.value;

localStorage.setItem(STORAGE,JSON.stringify(entries));

});

/* DOWNLOAD */

function downloadJournal(){

let text="";

Object.keys(entries).sort().forEach(date=>{
text += date + "\n" + entries[date] + "\n\n";
});

const blob = new Blob([text],{type:"text/plain"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href=url;
a.download="gratitude_journal.txt";
a.click();

URL.revokeObjectURL(url);

}

</script>

</body>
</html>
