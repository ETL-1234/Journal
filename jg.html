<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Gratitude Reflection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>

  html,body{
margin:0;
padding:0;
min-height:100vh;
overflow:hidden;
}

  body{
font-family:'Inter',sans-serif;
display:flex;
}
  
.app{
width:100%;
max-width:900px;
min-height:100vh;
position:relative;
display:flex;
flex-direction:column;
margin:0 auto;
box-sizing:border-box;

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* DARK OVERLAY */

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.25);
pointer-events:none;
z-index:1;
}

/* PROMPT AREA */

.promptArea{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
color:white;
z-index:2;
}

#prompt{
font-size:20px;
line-height:1.5;
margin-bottom:28px;
max-width:520px;
}

/* REFRESH BUTTON */

.refreshBtn{
display:flex;
align-items:center;
gap:8px;
background:transparent;
border:1.5px solid white;
color:white;
padding:10px 18px;
border-radius:24px;
font-size:14px;
cursor:pointer;
}

/* IMAGE BUTTON */

.imageBtn{
position:absolute;
top:18px;
right:18px;
width:28px;
height:28px;
cursor:pointer;
z-index:3;
}

/* JOURNAL PANEL */

.journalPanel{
  min-height:320px;
  flex:0 0 auto;

  background: rgba(255,255,255,1);  /* ↑ increase opacity slightly */
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);

  padding:24px;
  border-top-left-radius:36px;
  border-top-right-radius:36px;
  box-shadow:
     0 -12px 30px rgba(0,0,0,0.5);
     inset 0 1px 0 rgba(255,255,255,0.6);
  display:flex;
  flex-direction:column;
  z-index:3;
  margin-top:auto;
}
  
/* DATE */

.journalDate{
font-size:13px;
color:#333;
margin-bottom:10px;
}

/* TEXT AREA */

textarea{
flex:1;
width:100%;
border:none;
resize:none;
outline:none;
font-family:'Inter', sans-serif;
font-size:16px;
font-weight:400;
color:#000;
line-height:1.6;
background:transparent;
overflow:hidden;     /* prevents internal scroll */
}

  .entryBlock{
margin-bottom:32px;
}

.entryPrompt{
font-size:14px;
font-style:italic;
color:#999;
line-height:1.6;
margin-bottom:0px;
}

.entryReflection{
font-size:16px;
line-height:1.8;
color:#999;
white-space:pre-wrap;
}

/* DOWNLOAD */

.download{
  display:flex;
  justify-content:flex-end;
  cursor:pointer;
  margin-top:8px;
}

.download svg{
  width:20px;
  height:20px;
  flex-shrink: 0;     /* prevents flex stretching */
  display: block;     /* removes weird inline scaling */
  opacity:0.7;
  transition:opacity 0.2s ease, transform 0.2s ease;
}

.download:hover svg{
  opacity:1;
  transform:translateY(1px);
}

  
</style>
</head>

<body>

<div class="app">

<div class="overlay"></div>

<div class="imageBtn">
<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
<rect x="3" y="3" width="18" height="18" rx="2"/>
<circle cx="8.5" cy="8.5" r="1.5"/>
<path d="M21 15l-5-5L5 21"/>
</svg>
</div>

<div class="promptArea">

<div id="prompt">Loading reflection...</div>

<button class="refreshBtn" onclick="refreshPrompt()">



  
<svg width="16" height="16" viewBox="0 0 24 24" fill="white">
<path d="M17.65 6.35A7.95 7.95 0 0012 4V1L7 6l5 5V7a5 5 0 11-5 5H5a7 7 0 107.75-6.93z"/>
</svg>
Refresh Prompt
</button>

</div>

<div class="journalPanel">

<div id="currentDate" class="journalDate"></div>


<div id="entriesContainer"></div>

<div
id="activePrompt"
class="entryPrompt"
style="display:none;"
></div>

<textarea
id="journal"
  
placeholder="Daily gratitude reflection..."
></textarea>

<div class="download" onclick="downloadJournal()">
  <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3v12"/>
    <path d="M7 10l5 5 5-5"/>
    <path d="M5 21h14"/>
  </svg>
</div>

</div>

</div>


<script>

/* SUPABASE */

const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

/* ANALYTICS */

const APP_NAME = "ETL";
const CONTENT_NAME = "Gratitude Journal";

async function track(eventType, metadata = {}) {
  try {
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/analytics_journal`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          Prefer: "return=minimal"
        },
        body: JSON.stringify({
          app_name: APP_NAME,
          title_name: CONTENT_NAME,
          event_type: eventType,
          metadata: metadata
        })
      }
    );

    if (!response.ok) {
      const errorText = await response.text();
      console.error(
        "Analytics HTTP Error:",
        response.status,
        errorText
      );
    }
  } catch (err) {
    console.error("Analytics network error:", err);
  }
}

/* SESSION TRACKING */

let hasTrackedEntryStart = false;
let sessionStartTime = null;
let lastWordCount = 0;
  

/* BACKGROUND IMAGE */

const app = document.querySelector(".app");

const defaultImage = "https://tppyzexttkuvcobbbmaz.supabase.co/storage/v1/object/public/GratitudeImages/Standardbackground.jpg";

let savedImage = localStorage.getItem("gratitude_bg");

if (!savedImage || savedImage === "null" || savedImage.trim() === "") {
  savedImage = defaultImage;
}

const img = new Image();

img.onload = () => {
  app.style.backgroundImage = `url(${savedImage})`;
};

img.onerror = () => {
  app.style.backgroundImage = `url(${defaultImage})`;
};

img.src = savedImage;

  
/* DATE */

const today = new Date().toISOString().split('T')[0];
document.getElementById("currentDate").textContent = today;

  /* ANALYTICS */
track("view", {
  content: CONTENT_NAME
});
  
/* PROMPT FETCH */

async function loadPrompt(){

const res = await fetch(
`${SUPABASE_URL}/rest/v1/gratitudeprompts?select=gratitude&active=eq.true`,
{
headers:{
apikey:SUPABASE_ANON_KEY,
Authorization:`Bearer ${SUPABASE_ANON_KEY}`
}
});

const data = await res.json();

const random = data[Math.floor(Math.random()*data.length)];

document.getElementById("prompt").textContent = random.gratitude;

  currentPrompt = random.gratitude;

  /* ANALYTICS */
track("prompt_loaded", {
  content: CONTENT_NAME,
  prompt_text: random.gratitude
});

  
}
let currentPrompt = "";
loadPrompt();

async function refreshPrompt() {

  if(
entries[today].length &&
entries[today][entries[today].length-1].active
){

entries[today][
entries[today].length-1
].active = false;

localStorage.setItem(
STORAGE,
JSON.stringify(entries)
);

renderEntries();

textarea.value = "";

textarea.style.height = "auto";

}
  await loadPrompt();

  const promptText =
    document.getElementById("prompt").textContent;
  
/* ANALYTICS */
  track("prompt_refreshed", {
    content: CONTENT_NAME,
    prompt_text: promptText
  });
}
  
  
/* IMAGE PAGE */

function openImages(){

  /* ANALYTICS */
   track("background_opened", {
    content: CONTENT_NAME
  });
  
window.location.href="https://etl-1234.github.io/Journal/jgi.html";
}

  document.querySelector(".imageBtn").onclick = openImages;

/* JOURNAL STORAGE */

const STORAGE = "gratitude_journal";

let entries =
JSON.parse(localStorage.getItem(STORAGE) || "{}");

if (!entries[today]) {
entries[today] = [];
}

 entries[today].forEach(entry=>{
  entry.active = false;
});

localStorage.setItem(
  STORAGE,
  JSON.stringify(entries)
);
  

const textarea =
document.getElementById("journal");

const entriesContainer =
document.getElementById("entriesContainer");

const activePrompt =
document.getElementById("activePrompt");


  function renderEntries(){

entriesContainer.innerHTML = "";

(entries[today] || []).forEach(entry=>{

const block =
document.createElement("div");

block.className = "entryBlock";

block.innerHTML = `
<div class="entryPrompt">
${entry.prompt}
</div>

<div class="entryReflection">
${entry.reflection}
</div>
`;

entriesContainer.appendChild(block);

});

}

  renderEntries();
  
textarea.style.height = "auto";
textarea.style.height = textarea.scrollHeight + "px";

textarea.addEventListener("input",()=>{

  const text = textarea.value.trim();

  if(text){

  activePrompt.style.display = "block";
  activePrompt.textContent = currentPrompt;

}else{

  activePrompt.style.display = "none";

}

  const promptText =
    document.getElementById("prompt").textContent;

  /* ENTRY START ANALYTICS */

  if (!hasTrackedEntryStart) {

    sessionStartTime = Date.now();

    track("entry_started", {
      content: CONTENT_NAME,
      start_time: new Date().toISOString(),
      prompt_text: promptText
    });

    hasTrackedEntryStart = true;
  }

  /* EMPTY TEXT = REMOVE ACTIVE ENTRY */

  if (text === "") {

    if (
      entries[today].length &&
      entries[today][entries[today].length - 1].active
    ) {

      entries[today].pop();
    }

    localStorage.setItem(
      STORAGE,
      JSON.stringify(entries)
    );

    renderEntries();

    return;
  }

  /* CREATE NEW ACTIVE ENTRY */

  if (
    !entries[today].length ||
    !entries[today][entries[today].length - 1].active
  ) {

    entries[today].push({
      timestamp: new Date().toISOString(),
      prompt: currentPrompt,
      reflection: text,
      active: true
    });

  } else {

    /* UPDATE EXISTING ACTIVE ENTRY */

    entries[today][
      entries[today].length - 1
    ].reflection = text;
  }

  localStorage.setItem(
    STORAGE,
    JSON.stringify(entries)
  );

  /* SAVE ANALYTICS */

  const wordCount = text
    .trim()
    .split(/\s+/)
    .filter(Boolean)
    .length;

  lastWordCount = wordCount;

  track("entry_saved", {
    content: CONTENT_NAME,
    date: today,
    word_count: wordCount,
    entry_length: text.length,
    prompt_text: currentPrompt
  });

  /* AUTO EXPAND */

  textarea.style.height = "auto";
  textarea.style.height =
    textarea.scrollHeight + "px";

});

/* DOWNLOAD */

function downloadJournal(){

let text = "";

Object.keys(entries)
.sort()
.forEach(date=>{

text += date + "\n\n";

entries[date].forEach(entry=>{

const time =
new Date(entry.timestamp)
.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

text += time + "\n\n";
text += entry.prompt + "\n\n";
text += entry.reflection + "\n\n";

});

});

const blob = new Blob([text],{type:"text/plain"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href=url;
a.download="gratitude_journal.txt";
a.click();

/* ANALYTICS */

const totalEntries =
Object.values(entries)
.reduce(
  (sum, day) => sum + day.length,
  0
);

track("download", {
  content: CONTENT_NAME,
  total_entries: totalEntries
});

  
URL.revokeObjectURL(url);

}
  
/* ANALYTICS */
window.addEventListener("beforeunload", () => {

  if (!sessionStartTime) return;

  const timeSpentSeconds = Math.floor(
    (Date.now() - sessionStartTime) / 1000
  );

  track("completed", {
    content: CONTENT_NAME,
    time_spent_seconds: timeSpentSeconds,
    word_count: lastWordCount,
    session_type: "gratitude_journal",
    date: today
  });
});

  
</script>

</body>
</html>
